```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shailesh Ajabe Portfolio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --accent:#6c63ff;
  --accent2:#00c6ff;
  --bg:#0f172a;
  --text:#ffffff;
}

/* Animated Background */
body{
  font-family:Arial, sans-serif;
  color:var(--text);
  background: linear-gradient(-45deg,#0f172a,#1e293b,#312e81,#0f172a);
  background-size:400% 400%;
  animation:bg 12s ease infinite;
  overflow-x:hidden;
}
@keyframes bg{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* Cursor */
#cursor{
  width:15px;height:15px;
  background:#fff;
  position:fixed;
  border-radius:50%;
  pointer-events:none;
  mix-blend-mode:difference;
}

/* Layout */
section{padding:80px 20px;text-align:center;}
h1{font-size:3rem;}
h2{margin-bottom:20px;}

/* Hero */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}
.gradient-text{
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* Buttons */
.btn{
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  color:white;
  cursor:pointer;
  margin:10px;
}

/* Cards */
.card{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:12px;
  margin:10px;
  display:inline-block;
  width:250px;
  transition:0.3s;
}
.card:hover{
  transform:translateY(-10px);
  box-shadow:0 0 20px rgba(108,99,255,0.6);
}

/* Stats */
.stats{
  display:flex;
  justify-content:center;
  gap:40px;
}
.stats div h2{
  font-size:2rem;
  color:var(--accent2);
}

/* Project Grid */
.projects{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

/* Footer */
footer{
  padding:20px;
  text-align:center;
}
</style>
</head>

<body>

<div id="cursor"></div>

<!-- HERO -->
<section class="hero">
  <h1 class="gradient-text">Shailesh Ajabe</h1>
  <p id="typing"></p>

  <div id="github"></div>

  <button class="btn">View Projects</button>
</section>

<!-- STATS -->
<section>
  <h2>My Stats</h2>
  <div class="stats">
    <div><h2 id="exp">0</h2><p>Years Exp</p></div>
    <div><h2 id="proj">0</h2><p>Projects</p></div>
    <div><h2 id="repos">0</h2><p>GitHub Repos</p></div>
  </div>
</section>

<!-- PROJECTS -->
<section>
  <h2>Projects</h2>
  <div class="projects">
    <div class="card">
      <h3>LinkedIn Clone</h3>
      <p>Spring Boot Backend</p>
    </div>
    <div class="card">
      <h3>Insurance System</h3>
      <p>Microservices</p>
    </div>
  </div>
</section>

<footer>
  <p>© 2026 Shailesh Ajabe</p>
</footer>

<script>

/* Cursor */
document.addEventListener("mousemove",e=>{
  const c=document.getElementById("cursor");
  c.style.left=e.clientX+"px";
  c.style.top=e.clientY+"px";
});

/* Typing Effect */
const roles=["Java Developer","Spring Boot Engineer","Microservices Developer"];
let i=0,j=0,del=false;
const el=document.getElementById("typing");

function type(){
  let text=roles[i];
  if(!del){
    el.innerHTML=text.substring(0,j++);
    if(j>text.length){del=true;setTimeout(type,1000);return;}
  }else{
    el.innerHTML=text.substring(0,j--);
    if(j<0){del=false;i=(i+1)%roles.length;}
  }
  setTimeout(type,80);
}
type();

/* GitHub API */
async function github(){
  let res=await fetch("https://api.github.com/users/shaileshajabe");
  let data=await res.json();

  document.getElementById("github").innerHTML=
  `⭐ ${data.public_repos} Repos | 👥 ${data.followers} Followers`;

  document.getElementById("repos").innerText=data.public_repos;
}
github();

/* Counter */
function counter(id,target){
  let c=0;
  let int=setInterval(()=>{
    c++;
    document.getElementById(id).innerText=c;
    if(c>=target)clearInterval(int);
  },30);
}

counter("exp",2);
counter("proj",5);

</script>

</body>
</html>
